name: irma
description: "A privacy-first, AI-driven mental wellness and cycle tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Local Storage (Privacy First)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Date formatting
  intl: ^0.19.0
  
  # Data Visualization (Premium)
  fl_chart: ^0.68.0
  
  # Subscription/Freemium
  purchases_flutter: ^9.14.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Data Export & Sharing (Phase 17)
  csv: ^6.0.0
  share_plus: ^9.0.0

  # Ecosystem & Widgets (Phase 18)
  health: ^10.0.0
  home_widget: ^0.6.0
  permission_handler: ^11.0.0

  # Typography (Phase 23)
  google_fonts: ^6.2.1

  # Production Polish (Phase 21)
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.2.5
  sentry_flutter: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - .env
