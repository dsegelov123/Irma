name: irma
description: "A privacy-first, AI-driven mental wellness and cycle tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Local Storage (Privacy First)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Date formatting
  intl: ^0.19.0
  
  # Data Visualization (Premium)
  fl_chart: ^0.68.0
  
  # Subscription/Freemium
  purchases_flutter: ^9.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
